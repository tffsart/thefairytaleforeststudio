<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Fairytale Forest Studio</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="site-header">

    <nav class="main-nav">

        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="scene-library.html">Scene Library</a>
        <a href="recognition.html">Recognition</a>
        <a href="contact.html">Contact</a>

    </nav>

</header>


<main>

    <section class="hero">

        <div class="window-wrapper">

            <div class="window">

                <img
                    src="assets/window-forest.jpg"
                    alt="A forest beyond the window"
                    class="window-image"
                >

                <div class="window-fireflies"></div>

                <div class="window-frame">

                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>

                </div>

            </div>

        </div>

        <div class="hero-content">

            <h1>
                The Fairytale Forest Studio
            </h1>

            <p>
                A place where people can see the scenes they carry.
            </p>

        </div>

    </section>


    <section class="forest-transition">

        <div class="forest-darkness">

            <div class="floating-light light-1"></div>
            <div class="floating-light light-2"></div>
            <div class="floating-light light-3"></div>
            <div class="floating-light light-4"></div>
            <div class="floating-light light-5"></div>
            <div class="floating-light light-6"></div>
            <div class="floating-light light-7"></div>
            <div class="floating-light light-8"></div>

        </div>

    </section>


    <section class="forest-path">

        <div class="path-lights">

            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>

        </div>

    </section>


    <section class="forest-lantern">

        <div class="lantern-container">

            <div class="lantern-placeholder"></div>

        </div>

    </section>


    <section class="forest-sign">

        <div class="sign-wrapper">

            <div class="sign-placeholder">
                Scene Library
            </div>

        </div>

    </section>


    <section class="forest-gate">

        <a
            href="scene-library.html"
            class="enter-forest-button"
        >
            Enter the Forest
        </a>

    </section>

</main>

<script src="script.js"></script>

</body>
</html>
