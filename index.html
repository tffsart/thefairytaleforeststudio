                <div class="star star4"></div>
                <div class="star star5"></div>

                    <div></div>
                    <div></div>

                    <div></div>

        <div class="hero-content">

    <section class="forest-path">

        <div class="path-lights">

            <span></span>
            <span></span>

            <span></span>
            <span></span>

        <a
