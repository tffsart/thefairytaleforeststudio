name: Sync Scenes

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Notion Connection
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          curl -X POST "https://api.notion.com/v1/databases/3785e235d4c88006b7cfd4e824daaee7/query" \
          -H "Authorization: Bearer $NOTION_TOKEN" \
          -H "Notion-Version: 2022-06-28" \
          -H "Content-Type: application/json" \
          -o notion-response.json

          echo "=== NOTION RESPONSE ==="
          cat notion-response.json

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git diff --staged --quiet || git commit -m "Sync scenes"

          git push