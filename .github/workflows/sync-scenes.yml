name: Sync Scenes

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Scene Library from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          curl -X POST "https://api.notion.com/v1/databases/3785e235d4c88006b7cfd4e824daaee7/query" \
          -H "Authorization: Bearer $NOTION_TOKEN" \
          -H "Notion-Version: 2022-06-28" \
          -H "Content-Type: application/json" \
          -o notion-response.json

      - name: Create scenes.json
        run: |
          python3 << 'EOF'
          import json

          with open("notion-response.json", "r", encoding="utf-8") as f:
              notion = json.load(f)

          scenes = []

          for page in notion["results"]:

              props = page["properties"]

              title = ""

              if props["Title"]["title"]:
                  title = props["Title"]["title"][0]["plain_text"]

              scene_id = ""

              if props["Scene ID"]["rich_text"]:
                  scene_id = props["Scene ID"]["rich_text"][0]["plain_text"]

              status = ""

              if props["Status"]["select"]:
                  status = props["Status"]["select"]["name"]

              mediums = []

              for m in props["Mediums"]["multi_select"]:
                  mediums.append(m["name"])

              scenes.append({
                  "id": scene_id,
                  "title": title,
                  "status": status,
                  "mediums": mediums
              })

          with open("data/scenes.json", "w", encoding="utf-8") as f:
              json.dump(
                  scenes,
                  f,
                  ensure_ascii=False,
                  indent=2
              )

          print("Generated data/scenes.json")
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git diff --staged --quiet || git commit -m "Sync scenes"

          git push