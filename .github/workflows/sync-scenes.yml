name: Sync Scenes

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create scenes file
        run: |
          mkdir -p data

          cat > data/scenes.json << 'EOF'
          [
            {
              "id": "001",
              "title": "Tea in the Spring Garden",
              "status": "Published",
              "mediums": ["Music"]
            }
          ]
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git diff --staged --quiet || git commit -m "Sync scenes"

          git push